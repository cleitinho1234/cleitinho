<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planta Fácil</title>

<style>

body{
margin:0;
background:#222;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin:10px;
font-size:20px;
}

canvas{
border:2px solid black;
touch-action:none;
}

button{
margin:10px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Alisson da Cruz Silva fez esse site para Renilson</h1>

<canvas id="canvas" width="800" height="600"></canvas>

<div>
<button onclick="undoLine()">Apagar última linha</button>
<button onclick="download()">Baixar Planta</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing=false;
let startX,startY;

const grid=40;

// lista de linhas
let lines=[];

function drawGrid(){

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#ddd";

for(let x=0;x<canvas.width;x+=grid){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();
}

for(let y=0;y<canvas.height;y+=grid){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();
}

}

function redraw(){

drawGrid();

ctx.strokeStyle="black";
ctx.lineWidth=4;

lines.forEach(line=>{
ctx.beginPath();
ctx.moveTo(line.x1,line.y1);
ctx.lineTo(line.x2,line.y2);
ctx.stroke();
});

}

drawGrid();

canvas.addEventListener("pointerdown",(e)=>{

drawing=true;

const rect=canvas.getBoundingClientRect();

startX=Math.round((e.clientX-rect.left)/grid)*grid;
startY=Math.round((e.clientY-rect.top)/grid)*grid;

});

canvas.addEventListener("pointerup",(e)=>{

if(!drawing) return;

drawing=false;

const rect=canvas.getBoundingClientRect();

let endX=Math.round((e.clientX-rect.left)/grid)*grid;
let endY=Math.round((e.clientY-rect.top)/grid)*grid;

// salva linha
lines.push({
x1:startX,
y1:startY,
x2:endX,
y2:endY
});

redraw();

});

function undoLine(){

lines.pop(); // remove última linha
redraw();

}

function download(){

const tempCanvas=document.createElement("canvas");
const tempCtx=tempCanvas.getContext("2d");

tempCanvas.width=canvas.width;
tempCanvas.height=canvas.height;

tempCtx.fillStyle="white";
tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

tempCtx.drawImage(canvas,0,0);

const link=document.createElement("a");

link.download="planta.png";
link.href=tempCanvas.toDataURL("image/png");

link.click();

}

</script>

</body>
</html>
