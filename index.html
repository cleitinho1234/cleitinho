<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planta Fácil</title>

<style>

body{
margin:0;
background:#222;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin:10px;
font-size:18px;
}

canvas{
border:2px solid black;
touch-action:none;
background:white;
}

.controls{
margin:10px;
}

button{
margin:5px;
padding:10px 15px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Alisson da Cruz Silva fez esse site para Renilson</h1>

<canvas id="canvas"></canvas>

<div class="controls">

<button onclick="zoomIn()">🔍+</button>
<button onclick="zoomOut()">🔍-</button>
<button onclick="undoLine()">Apagar última linha</button>
<button onclick="download()">Baixar Planta</button>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const grid=40;
const snapDistance=20;

let zoom=1;

let lines=[];
let texts=[];

let startX,startY;
let moved=false;
let holdTimer=null;

let draggingText=null;

function resizeCanvas(){

canvas.width=window.innerWidth*0.95;
canvas.height=window.innerHeight*0.65;

redraw();

}

window.addEventListener("resize",resizeCanvas);

resizeCanvas();

function zoomIn(){

zoom+=0.2;
redraw();

}

function zoomOut(){

zoom-=0.2;

if(zoom<0.4){
zoom=0.4;
}

redraw();

}

function drawGrid(){

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.scale(zoom,zoom);

for(let x=0;x<canvas.width;x+=grid){

ctx.beginPath();

if(x%(grid*5)===0){

ctx.strokeStyle="#666";
ctx.lineWidth=2;

}else{

ctx.strokeStyle="#999";
ctx.lineWidth=1.4;

}

ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();

}

for(let y=0;y<canvas.height;y+=grid){

ctx.beginPath();

if(y%(grid*5)===0){

ctx.strokeStyle="#666";
ctx.lineWidth=2;

}else{

ctx.strokeStyle="#999";
ctx.lineWidth=1.4;

}

ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();

}

ctx.restore();

}

function redraw(){

drawGrid();

ctx.save();
ctx.scale(zoom,zoom);

ctx.strokeStyle="#111";
ctx.lineWidth=6;

lines.forEach(line=>{

ctx.beginPath();
ctx.moveTo(line.x1,line.y1);
ctx.lineTo(line.x2,line.y2);
ctx.stroke();

if(line.text){

let mx=(line.x1+line.x2)/2;
let my=(line.y1+line.y2)/2;

ctx.fillStyle="blue";
ctx.font="16px Arial";
ctx.fillText(line.text,mx+5,my-5);

}

});

texts.forEach(t=>{

ctx.fillStyle="red";
ctx.font="18px Arial";
ctx.fillText(t.text,t.x,t.y);

});

ctx.restore();

}

function getMousePos(e){

const rect=canvas.getBoundingClientRect();

return{

x:(e.clientX-rect.left)/zoom,
y:(e.clientY-rect.top)/zoom

};

}

canvas.addEventListener("pointerdown",(e)=>{

let pos=getMousePos(e);

let x=pos.x;
let y=pos.y;

startX=Math.round(x/grid)*grid;
startY=Math.round(y/grid)*grid;

moved=false;

});

canvas.addEventListener("pointermove",(e)=>{

moved=true;

});

canvas.addEventListener("pointerup",(e)=>{

if(!moved) return;

let pos=getMousePos(e);

let x=pos.x;
let y=pos.y;

let endX=Math.round(x/grid)*grid;
let endY=Math.round(y/grid)*grid;

lines.push({
x1:startX,
y1:startY,
x2:endX,
y2:endY,
text:""
});

redraw();

});

function undoLine(){

lines.pop();
redraw();

}

function download(){

const tempCanvas=document.createElement("canvas");
const tempCtx=tempCanvas.getContext("2d");

tempCanvas.width=canvas.width;
tempCanvas.height=canvas.height;

tempCtx.fillStyle="white";
tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

tempCtx.drawImage(canvas,0,0);

const link=document.createElement("a");

link.download="planta.png";
link.href=tempCanvas.toDataURL("image/png");

link.click();

}

</script>

</body>
</html>
