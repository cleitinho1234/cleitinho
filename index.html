<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Luffy Music</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

header{
background:#ff0000;
padding:20px;
font-size:28px;
font-weight:bold;
}

input{
padding:12px;
font-size:18px;
width:300px;
border-radius:8px;
border:none;
margin-top:20px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff0000;
color:white;
margin-left:10px;
}

#resultados{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.video{
background:#1c1c1c;
padding:10px;
border-radius:10px;
width:320px;
}

.video img{
width:100%;
border-radius:8px;
}

iframe{
margin-top:10px;
width:100%;
height:200px;
border:none;
}

</style>

</head>

<body>

<header>
🎵 Luffy Music Player
</header>

<p>Pesquise qualquer música</p>

<input id="pesquisa" placeholder="Digite a música">

<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>

<script>

const API_KEY = "AIzaSyAnVec0Ks4CiBkg6hvD20hf1lSI9UgV_ts";

function buscar(){

let musica = document.getElementById("pesquisa").value;

fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${musica}&type=video&maxResults=8&key=${API_KEY}`)

.then(res => res.json())

.then(data => {

let html = "";

data.items.forEach(video => {

let videoId = video.id.videoId;
let titulo = video.snippet.title;
let thumb = video.snippet.thumbnails.medium.url;

html += `

<div class="video">

<img src="${thumb}">

<h3>${titulo}</h3>

<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>

</div>

`;

});

document.getElementById("resultados").innerHTML = html;

});

}

</script>

</body>
</html>
