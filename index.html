<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planta Fácil</title>

<style>

body{
margin:0;
background:#222;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin:10px;
font-size:18px;
}

canvas{
border:2px solid black;
touch-action:none;
background:white;
}

button{
margin:10px;
padding:12px 20px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Alisson da Cruz Silva fez esse site para Renilson</h1>

<canvas id="canvas"></canvas>

<div>
<button onclick="undoLine()">Apagar última linha</button>
<button onclick="download()">Baixar Planta</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const grid = 40;
const snapDistance = 20;

let lines=[];
let texts=[];

let startX,startY;
let moved=false;
let holdTimer=null;

function resizeCanvas(){

canvas.width = window.innerWidth * 0.95;
canvas.height = window.innerHeight * 0.65;

redraw();

}

window.addEventListener("resize", resizeCanvas);

resizeCanvas();

function drawGrid(){

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let x=0;x<canvas.width;x+=grid){

ctx.beginPath();

if(x % (grid*5) === 0){

ctx.strokeStyle="#666";
ctx.lineWidth=2;

}else{

ctx.strokeStyle="#999";
ctx.lineWidth=1.4;

}

ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();

}

for(let y=0;y<canvas.height;y+=grid){

ctx.beginPath();

if(y % (grid*5) === 0){

ctx.strokeStyle="#666";
ctx.lineWidth=2;

}else{

ctx.strokeStyle="#999";
ctx.lineWidth=1.4;

}

ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();

}

}

function redraw(){

drawGrid();

ctx.strokeStyle="#111";
ctx.lineWidth=6;

lines.forEach(line=>{

ctx.beginPath();
ctx.moveTo(line.x1,line.y1);
ctx.lineTo(line.x2,line.y2);
ctx.stroke();

if(line.text){

let mx=(line.x1+line.x2)/2;
let my=(line.y1+line.y2)/2;

ctx.fillStyle="blue";
ctx.font="16px Arial";
ctx.fillText(line.text,mx+5,my-5);

}

});

texts.forEach(t=>{

ctx.fillStyle="red";
ctx.font="18px Arial";
ctx.fillText(t.text,t.x,t.y);

});

}

function snapToLine(x,y){

for(let line of lines){

if(Math.abs(x-line.x1)<snapDistance && Math.abs(y-line.y1)<snapDistance){
return {x:line.x1,y:line.y1};
}

if(Math.abs(x-line.x2)<snapDistance && Math.abs(y-line.y2)<snapDistance){
return {x:line.x2,y:line.y2};
}

}

return {x,y};

}

canvas.addEventListener("pointerdown",(e)=>{

const rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let snapped=snapToLine(x,y);

startX=Math.round(snapped.x/grid)*grid;
startY=Math.round(snapped.y/grid)*grid;

moved=false;

holdTimer=setTimeout(()=>{

let clickedLine=findLine(x,y);

let value=prompt("Digite medida ou nome (Ex: 3.50m, Sala)");

if(value){

if(clickedLine){

clickedLine.text=value;

}else{

texts.push({
text:value,
x:x,
y:y
});

}

redraw();

}

},1000);

});

canvas.addEventListener("pointermove",()=>{

moved=true;
clearTimeout(holdTimer);

});

canvas.addEventListener("pointerup",(e)=>{

clearTimeout(holdTimer);

if(!moved) return;

const rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let snapped=snapToLine(x,y);

let endX=Math.round(snapped.x/grid)*grid;
let endY=Math.round(snapped.y/grid)*grid;

lines.push({
x1:startX,
y1:startY,
x2:endX,
y2:endY,
text:""
});

redraw();

});

function findLine(x,y){

for(let line of lines){

let dist=distanceToLine(x,y,line);

if(dist<10){
return line;
}

}

return null;

}

function distanceToLine(px,py,line){

let x1=line.x1;
let y1=line.y1;
let x2=line.x2;
let y2=line.y2;

let A=px-x1;
let B=py-y1;
let C=x2-x1;
let D=y2-y1;

let dot=A*C+B*D;
let len=C*C+D*D;

let param=dot/len;

let xx,yy;

if(param<0){
xx=x1; yy=y1;
}else if(param>1){
xx=x2; yy=y2;
}else{
xx=x1+param*C;
yy=y1+param*D;
}

let dx=px-xx;
let dy=py-yy;

return Math.sqrt(dx*dx+dy*dy);

}

function undoLine(){

lines.pop();
redraw();

}

function download(){

let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;

lines.forEach(l=>{
minX=Math.min(minX,l.x1,l.x2);
minY=Math.min(minY,l.y1,l.y2);
maxX=Math.max(maxX,l.x1,l.x2);
maxY=Math.max(maxY,l.y1,l.y2);
});

texts.forEach(t=>{
minX=Math.min(minX,t.x);
minY=Math.min(minY,t.y);
maxX=Math.max(maxX,t.x);
maxY=Math.max(maxY,t.y);
});

let drawWidth=maxX-minX;
let drawHeight=maxY-minY;

const tempCanvas=document.createElement("canvas");
const tempCtx=tempCanvas.getContext("2d");

tempCanvas.width=canvas.width;
tempCanvas.height=canvas.height;

tempCtx.fillStyle="white";
tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

let offsetX=(tempCanvas.width-drawWidth)/2-minX;
let offsetY=(tempCanvas.height-drawHeight)/2-minY;

tempCtx.translate(offsetX,offsetY);
tempCtx.drawImage(canvas,0,0);

const link=document.createElement("a");

link.download="planta.png";
link.href=tempCanvas.toDataURL("image/png");

link.click();

}

</script>

</body>
</html>
